    <line x1="124" y1="90" x2="258" y2="90" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Bottom table: 2 rows x 4 cols -->
    <rect x="34" y="108" width="228" height="11" rx="1" fill="#f0f0f0" stroke="#e4e4e4" stroke-width="0.8"/>
    <line x1="88" y1="108" x2="88" y2="148" stroke="#e4e4e4" stroke-width="0.8"/>
    <line x1="156" y1="108" x2="156" y2="148" stroke="#e4e4e4" stroke-width="0.8"/>
    <line x1="218" y1="108" x2="218" y2="148" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="119" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="129" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="139" width="228" height="9" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
