<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 214">
  <rect width="300" height="214" fill="#f0f0f0"/>
  <rect x="18" y="10" width="264" height="188" rx="3" fill="#ffffff" stroke="#d8d8d8" stroke-width="1"/>
  <rect x="18" y="10" width="264" height="3" fill="#1a1a1a"/>
  <line x1="30" y1="10" x2="30" y2="198" stroke="#e8e8e8" stroke-width="0.8"/>
  <g opacity="0.65">
    <!-- 2x3 storyboard grid -->
    <!-- Row 1 -->
    <rect x="34" y="18" width="72" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="114" y="18" width="72" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="194" y="18" width="68" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <!-- Row 2 -->
    <rect x="34" y="66" width="72" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="114" y="66" width="72" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="194" y="66" width="68" height="42" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <!-- Row 3 -->
    <rect x="34" y="114" width="72" height="36" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="114" y="114" width="72" height="36" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <rect x="194" y="114" width="68" height="36" rx="1" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.8"/>
    <!-- small caption lines below each panel row -->
    <line x1="34" y1="124" x2="106" y2="124" stroke="#ebebeb" stroke-width="0.8"/>
    <line x1="114" y1="124" x2="186" y2="124" stroke="#ebebeb" stroke-width="0.8"/>
    <line x1="194" y1="124" x2="262" y2="124" stroke="#ebebeb" stroke-width="0.8"/>
  </g>
  <rect x="18" y="158" width="264" height="40" fill="rgba(255,255,255,0.92)"/>
  <line x1="18" y1="158" x2="282" y2="158" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="150" y="174" dominant-baseline="middle" text-anchor="middle" font-size="13" fill="#111111" font-family="'PingFang TC','Microsoft JhengHei',sans-serif" font-weight="600" letter-spacing="0.04em">手繪分鏡圖</text>
  <text x="150" y="191" dominant-baseline="middle" text-anchor="middle" font-size="8" fill="#aaaaaa" font-family="'PingFang TC','Microsoft JhengHei',sans-serif" letter-spacing="0.08em">Storyboard</text>
</svg>
