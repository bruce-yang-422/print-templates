<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 214">
  <rect width="300" height="214" fill="#f0f0f0"/>
  <rect x="18" y="10" width="264" height="188" rx="3" fill="#ffffff" stroke="#d8d8d8" stroke-width="1"/>
  <rect x="18" y="10" width="264" height="3" fill="#2563eb"/>
  <line x1="30" y1="10" x2="30" y2="198" stroke="#e8e8e8" stroke-width="0.8"/>
  <g opacity="0.65">
    <!-- Title bar -->
    <rect x="34" y="18" width="80" height="7" rx="1" fill="#d0d0d0"/>
    <!-- Calendar grid: 7 cols x 6 rows (header + 5 weeks) -->
    <!-- Header row (day names) -->
    <rect x="34" y="30" width="228" height="9" rx="1" fill="#eeeeee"/>
    <!-- Grid lines vertical (7 cols) -->
    <line x1="66" y1="30" x2="66" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="98" y1="30" x2="98" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="130" y1="30" x2="130" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="162" y1="30" x2="162" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="194" y1="30" x2="194" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="226" y1="30" x2="226" y2="152" stroke="#e8e8e8" stroke-width="0.8"/>
    <!-- Grid lines horizontal (5 week rows) -->
    <line x1="34" y1="39" x2="262" y2="39" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="63" x2="262" y2="63" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="87" x2="262" y2="87" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="111" x2="262" y2="111" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="135" x2="262" y2="135" stroke="#e8e8e8" stroke-width="0.8"/>
    <!-- Border -->
    <rect x="34" y="30" width="228" height="122" rx="1" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
  </g>
  <rect x="18" y="158" width="264" height="40" fill="rgba(255,255,255,0.92)"/>
  <line x1="18" y1="158" x2="282" y2="158" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="150" y="174" dominant-baseline="middle" text-anchor="middle" font-size="13" fill="#111111" font-family="'PingFang TC','Microsoft JhengHei',sans-serif" font-weight="600" letter-spacing="0.04em">月計畫</text>
  <text x="150" y="191" dominant-baseline="middle" text-anchor="middle" font-size="8" fill="#aaaaaa" font-family="'PingFang TC','Microsoft JhengHei',sans-serif" letter-spacing="0.08em">Monthly Planner</text>
</svg>
