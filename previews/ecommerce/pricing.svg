<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 214">
  <rect width="300" height="214" fill="#f0f0f0"/>
  <rect x="18" y="10" width="264" height="188" rx="3" fill="#ffffff" stroke="#d8d8d8" stroke-width="1"/>
  <rect x="18" y="10" width="264" height="3" fill="#7c3aed"/>
  <line x1="30" y1="10" x2="30" y2="198" stroke="#e8e8e8" stroke-width="0.8"/>
  <g opacity="0.65">
    <!-- 3-column price comparison table -->
    <!-- Header row -->
    <rect x="34" y="18" width="228" height="9" rx="1" fill="#eeeeee"/>
    <line x1="110" y1="18" x2="110" y2="152" stroke="#e4e4e4" stroke-width="0.8"/>
    <line x1="186" y1="18" x2="186" y2="152" stroke="#e4e4e4" stroke-width="0.8"/>
    <!-- Feature rows x5 -->
    <rect x="34" y="27" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="37" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="47" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="57" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="67" width="228" height="10" rx="0" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <!-- Border around entire table -->
    <rect x="34" y="18" width="228" height="60" rx="1" fill="none" stroke="#e4e4e4" stroke-width="0.8"/>
    <!-- Strategy notes -->
    <rect x="34" y="88" width="228" height="60" rx="1" fill="#fafafa" stroke="#e4e4e4" stroke-width="0.8"/>
    <rect x="34" y="88" width="80" height="6" rx="1" fill="#d8d8d8"/>
    <line x1="34" y1="100" x2="262" y2="100" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="108" x2="262" y2="108" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="116" x2="262" y2="116" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="124" x2="262" y2="124" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="132" x2="262" y2="132" stroke="#e8e8e8" stroke-width="0.8"/>
    <line x1="34" y1="140" x2="262" y2="140" stroke="#e8e8e8" stroke-width="0.8"/>
