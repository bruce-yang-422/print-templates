    <line x1="96" y1="62" x2="146" y2="62" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="96" y1="70" x2="146" y2="70" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="154" y1="62" x2="204" y2="62" stroke="#e0e0e0" stroke-width="1"/>
