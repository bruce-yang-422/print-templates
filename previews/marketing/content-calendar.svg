    <line x1="154" y1="36" x2="204" y2="36" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="154" y1="44" x2="204" y2="44" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="212" y1="36" x2="258" y2="36" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="212" y1="44" x2="258" y2="44" stroke="#e0e0e0" stroke-width="1"/>
    <!-- row 2 -->
    <line x1="38" y1="62" x2="88" y2="62" stroke="#e0e0e0" stroke-width="1"/>
