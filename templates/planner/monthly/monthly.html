<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>月計畫模板</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif; background: #c8c8c8; color: #1a1a1a; }

/* ════ Pages ════ */
.pages { padding: 104px 0 48px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
.page-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #999; padding-bottom: 6px; }
.page { background: #fff; box-shadow: 0 2px 20px rgba(0,0,0,.2); overflow: hidden; position: relative; }
.page::before { content: ''; position: absolute; top: 0; bottom: 0; left: 0; width: 10mm; background: #fff; z-index: 4; pointer-events: none; }
.page::after { content: ''; position: absolute; top: 0; bottom: 0; left: 10mm; border-left: 0.6pt solid #d6d6d6; z-index: 5; pointer-events: none; }
.page-land { width: 297mm; height: 210mm; }

/* Mode control */
.mode-a, .mode-b { display: none; }
body.sel-a .mode-a { display: block; }
body.sel-b .mode-b { display: block; }

/* ════ 共用 ════ */
.pg-type { font-size: 6pt; letter-spacing: .2em; text-transform: uppercase; color: #bbb; display: block; }
.f-lbl   { font-size: 6pt; letter-spacing: .1em; color: #aaa; padding-right: 1.5mm; white-space: nowrap; }
.blank   { border-bottom: 0.6pt solid #111; display: inline-block; height: 4mm; }
.s-hd    { font-size: 6pt; letter-spacing: .13em; text-transform: uppercase; color: #777; font-weight: 600; display: block; }
.lc      { border-bottom: 0.4pt solid #ddd; height: 5mm; display: block; }
.sq      { display: inline-block; width: 3mm; height: 3mm; border: 0.65pt solid #777; }
.ck-sq   { display: inline-block; width: 2.8mm; height: 2.8mm; border: 0.6pt solid #999; vertical-align: middle; margin-right: 1mm; }
.pg-num  { position: absolute; bottom: 10mm; right: 12mm; font-size: 6.5pt; letter-spacing: .1em; color: #ccc; }

/* ════ Mode A：月曆格 A4橫 ════ */
.cal-wrap  {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 4mm 8mm 12mm calc(var(--bind-gap) + 3mm);
  box-sizing: border-box;
}
.cal-head  { padding: 7mm 12mm 4mm; border-bottom: 0.75pt solid #111; display: flex; align-items: baseline; gap: 8mm; flex-shrink: 0; }
.cal-month { font-size: 18pt; font-weight: 700; letter-spacing: .04em; line-height: 1; }
.cal-sub   { font-size: 6pt; color: #aaa; letter-spacing: .12em; }

/* 星期列 */
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 0.75pt solid #111; flex-shrink: 0; }
.cal-wday { text-align: center; font-size: 6.5pt; letter-spacing: .1em; color: #777; padding: 2mm 0; font-weight: 600; }
.cal-wday.sat, .cal-wday.sun { color: #ccc; }

/* 日期格 */
.cal-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); min-height: 0; }
.cal-cell { border-right: 0.4pt solid #e8e8e8; border-bottom: 0.4pt solid #e8e8e8; padding: 2mm 2.5mm 1.5mm; display: flex; flex-direction: column; overflow: hidden; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.sat, .cal-cell.sun { background: #f7f7f7; }
.cal-cell.empty { background: #fafafa; }
.cal-cell.holiday { background: #eeeeee; }
.cal-cell.holiday-start { background: #eeeeee; }
.cal-cell.holiday-mid { background: #eeeeee; }
.cal-cell.holiday-end { background: #eeeeee; }
.cal-cell.holiday-single { background: #eeeeee; }
.cal-top { display: flex; align-items: baseline; justify-content: space-between; gap: 2mm; margin-bottom: .8mm; }
.cal-num  { font-size: 8pt; font-weight: 700; color: #333; margin-bottom: 1mm; flex-shrink: 0; }
.cal-lunar { font-size: 4.8pt; color: #aaa; letter-spacing: .02em; margin-bottom: 1mm; flex-shrink: 0; }
.cal-holiday { font-size: 4.4pt; color: #666; line-height: 1.2; min-height: 5.2mm; margin-bottom: .8mm; flex-shrink: 0; }
.cal-cell.sat .cal-num, .cal-cell.sun .cal-num { color: #bbb; }
.cal-cell.empty .cal-num { color: #ddd; }
.cal-line { border-bottom: 0.4pt solid #efefef; flex: 1; margin-bottom: 0.5mm; }

/* Print range: out-range cells hide writing area */
.cal-cell.out-range { background: #fff !important; }
.trk-cell.out-range { background: #fff !important; }
.cal-cell.out-range .cal-line { border-bottom-color: transparent !important; }
.cal-cell.out-range .cal-num,
.cal-cell.out-range .cal-lunar,
.cal-cell.out-range .cal-holiday { opacity: 0; }
.trk-cell.out-range .trk-top,
.trk-cell.out-range .trk-holiday { opacity: 0; }

/* ════ Mode B：目標追蹤 A4橫 ════ */
.trk-wrap  {
  width: 100%;
  height: 100%;
  display: flex;
  min-height: 0;
  padding: 4mm 8mm 12mm calc(var(--bind-gap) + 3mm);
  box-sizing: border-box;
}

/* 左側：月曆（縮小版） */
.trk-cal   { width: 46%; border-right: 0.75pt solid #111; display: flex; flex-direction: column; min-height: 0; }
.trk-ch    { padding: 7mm 10mm 4mm; border-bottom: 0.75pt solid #111; flex-shrink: 0; }
.trk-month { font-size: 16pt; font-weight: 700; letter-spacing: .04em; }
.trk-wdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 0.5pt solid #ddd; flex-shrink: 0; }
.trk-wday  { text-align: center; font-size: 5.5pt; color: #aaa; padding: 1.5mm 0; }
.trk-grid  { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); min-height: 0; }
.trk-cell  { border-right: 0.3pt solid #efefef; border-bottom: 0.3pt solid #efefef; padding: 1mm; display: flex; flex-direction: column; }
.trk-cell:nth-child(7n) { border-right: none; }
.trk-cell.holiday { background: #eeeeee; }
.trk-cell.holiday-start { background: #eeeeee; }
.trk-cell.holiday-mid { background: #eeeeee; }
.trk-cell.holiday-end { background: #eeeeee; }
.trk-cell.holiday-single { background: #eeeeee; }
.trk-top { display: flex; align-items: baseline; justify-content: space-between; gap: .8mm; }
.trk-num   { font-size: 6.5pt; color: #555; }
.trk-lunar { font-size: 4pt; color: #b2b2b2; line-height: 1.2; }
.trk-holiday { font-size: 3.5pt; color: #666; line-height: 1.1; min-height: 4mm; }
.trk-cell.sat .trk-num, .trk-cell.sun .trk-num { color: #ccc; }
.trk-cell.empty .trk-num { color: #e8e8e8; }
.trk-dot   { flex: 1; }

/* 右側：目標追蹤 */
.trk-right { flex: 1; padding: 7mm 12mm 7mm 10mm; display: flex; flex-direction: column; gap: 0; min-height: 0; }
.trk-rhead { margin-bottom: 4mm; }
.trk-goals { display: flex; flex-direction: column; gap: 5mm; }
.trk-goal  { border-left: 2pt solid #111; padding-left: 4mm; }
.trk-g-hd  { font-size: 6pt; letter-spacing: .1em; text-transform: uppercase; color: #777; font-weight: 600; margin-bottom: 2mm; display: flex; justify-content: space-between; align-items: center; }
.trk-g-title { display: flex; align-items: baseline; gap: 2mm; }
.trk-g-num { font-size: 8pt; font-weight: 700; color: #ccc; }
.trk-bar   { display: flex; gap: 1mm; margin-top: 2mm; }
.trk-tick  { width: 5mm; height: 3mm; border: 0.5pt solid #ddd; flex-shrink: 0; }
.trk-notes { flex: 1; border-top: 0.75pt solid #111; padding-top: 4mm; margin-top: auto; display: flex; flex-direction: column; min-height: 0; }
.trk-note-line { border-bottom: 0.4pt solid #ddd; min-height: 5.5mm; flex: 1; display: block; margin-bottom: 0; }

.page.mode-a .cal-head { padding: 6mm 5mm 4mm !important; }
.page.mode-b .trk-ch { padding: 6mm 5mm 4mm !important; }
.page.mode-b .trk-right { padding: 6mm 5mm 6mm 8mm !important; }

/* ════ Print ════ */
@media print {
  body { background: none; }
  .ui, .page-label { display: none !important; }
  .pages { padding: 0 !important; gap: 0 !important; }
  .page  { box-shadow: none !important; page-break-after: always; break-after: page; break-inside: avoid-page; }
  .cal-wrap, .trk-wrap { break-inside: avoid-page; }
  .mode-a, .mode-b { display: none !important; }
  body.sel-a .mode-a { display: block !important; }
  body.sel-b .mode-b { display: block !important; }
}

<script>
const Calendar = window.TemplateCalendar;
let monthStartMode = localStorage.getItem('monthlyStartMode') || 'sun'; // 'sun' or 'mon'

(function () {
  const now = new Date();
  const selYear = document.getElementById('sel-year');
  for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 3; y++) {
    const option = document.createElement('option');
    option.value = y;
    option.textContent = y;
    if (y === now.getFullYear()) option.selected = true;
    selYear.appendChild(option);
  }
  document.getElementById('sel-month').value = now.getMonth() + 1;
  
  // 初始化周開始按鈕
  syncMonthStartButtons();
})();

function syncMonthStartButtons() {
  document.querySelectorAll('[data-week-start]').forEach((button) => {
    button.classList.toggle('active', button.dataset.weekStart === monthStartMode);
  });
}

function firstDayOffset(year, month, startDay) {
  // startDay: 0 = Sunday, 1 = Monday
  const firstDay = new Date(year, month - 1, 1).getDay();
  if (startDay === 0) {
    return firstDay; // Sun-Sat: 0-6
  } else {
    // Mon-Sun: 1-0
    return firstDay === 0 ? 6 : firstDay - 1;
  }
}

function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function firstDayOffset(year, month) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  return firstDay;
}

function buildGridA(year, month, rangeStart, rangeEnd) {
  const total = daysInMonth(year, month);
  const startDay = monthStartMode === 'mon' ? 1 : 0;
  const offset = firstDayOffset(year, month, startDay);
  const rows = Math.ceil((total + offset) / 7);
  const cells = rows * 7;
  const grid = document.getElementById('cal-grid-a');
  grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';
  grid.innerHTML = '';

  for (let i = 0; i < cells; i++) {
    const day = i - offset + 1;
    const isEmpty = day < 1 || day > total;
    const col = i % 7;
    const isSun = col === 0;
    const isSat = col === 6;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' +
      (isEmpty ? ' empty' : '') +
      (isSat ? ' sat' : '') +
      (isSun ? ' sun' : '');

    if (!isEmpty) {
      const date = new Date(year, month - 1, day);
      const inRange = date >= rangeStart && date <= rangeEnd;
      const meta = Calendar.getMetaParts(year, month, day);
      const holidayText = Calendar.getHolidayText(meta);
      const holidaySpan = (inRange && meta && meta.is_holiday === '1') ? Calendar.getHolidaySpan(year, month, day) : '';
      if (inRange && holidayText) {
        cell.classList.add('holiday');
        cell.classList.add('holiday-' + (holidaySpan || 'single'));
      }
      if (!inRange) cell.classList.add('out-range');

      const top = document.createElement('div');
      top.className = 'cal-top';

      const num = document.createElement('span');
      num.className = 'cal-num';
      num.textContent = inRange ? day : '';
      top.appendChild(num);

      const lunar = document.createElement('span');
      lunar.className = 'cal-lunar';
      lunar.textContent = inRange ? Calendar.getLunarText(date, meta) : '';
      top.appendChild(lunar);

      cell.appendChild(top);

      const holiday = document.createElement('div');
      holiday.className = 'cal-holiday';
      holiday.textContent = inRange ? holidayText : '';
      cell.appendChild(holiday);
    } else {
      const num = document.createElement('span');
      num.className = 'cal-num';
      num.textContent = '';
      cell.appendChild(num);
    }

    for (let lineIndex = 0; lineIndex < 2; lineIndex++) {
      const line = document.createElement('span');
      line.className = 'cal-line';
      cell.appendChild(line);
    }
    grid.appendChild(cell);
  }
}

function buildGridB(year, month, rangeStart, rangeEnd) {
  const total = daysInMonth(year, month);
  const startDay = monthStartMode === 'mon' ? 1 : 0;
  const offset = firstDayOffset(year, month, startDay);
  const rows = Math.ceil((total + offset) / 7);
  const cells = rows * 7;
  const grid = document.getElementById('trk-grid-b');
  grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';
  grid.innerHTML = '';

  for (let i = 0; i < cells; i++) {
    const day = i - offset + 1;
    const isEmpty = day < 1 || day > total;
    const col = i % 7;
    const isSun = col === 0;
    const isSat = col === 6;
    const cell = document.createElement('div');
    cell.className = 'trk-cell' +
      (isEmpty ? ' empty' : '') +
      (isSat ? ' sat' : '') +
      (isSun ? ' sun' : '');

    if (!isEmpty) {
      const date = new Date(year, month - 1, day);
      const inRange = date >= rangeStart && date <= rangeEnd;
      const meta = Calendar.getMetaParts(year, month, day);
      const holidayText = Calendar.getHolidayText(meta);
      const holidaySpan = (inRange && meta && meta.is_holiday === '1') ? Calendar.getHolidaySpan(year, month, day) : '';
      if (inRange && holidayText) {
        cell.classList.add('holiday');
        cell.classList.add('holiday-' + (holidaySpan || 'single'));
      }
      if (!inRange) cell.classList.add('out-range');

      const top = document.createElement('div');
      top.className = 'trk-top';

      const num = document.createElement('span');
      num.className = 'trk-num';
      num.textContent = inRange ? day : '';
      top.appendChild(num);

      const lunar = document.createElement('span');
      lunar.className = 'trk-lunar';
      lunar.textContent = inRange ? Calendar.getLunarText(date, meta) : '';
      top.appendChild(lunar);

      cell.appendChild(top);

      const holiday = document.createElement('div');
      holiday.className = 'trk-holiday';
      holiday.textContent = inRange ? Calendar.compactHolidayText(holidayText) : '';
      cell.appendChild(holiday);
    } else {
      const num = document.createElement('span');
      num.className = 'trk-num';
      num.textContent = '';
      cell.appendChild(num);
    }

    const dot = document.createElement('span');
    dot.className = 'trk-dot';
    cell.appendChild(dot);

    grid.appendChild(cell);
  }
}

window.renderMonthOffset = function (offsetMonths) {
  let y = parseInt(document.getElementById('sel-year').value, 10);
  let m = parseInt(document.getElementById('sel-month').value, 10) + offsetMonths;
  while (m > 12) { m -= 12; y++; }
  while (m < 1) { m += 12; y--; }
  renderCal(y, m);
};

function renderCal(optYear, optMonth) {
  const year = optYear !== undefined ? optYear : parseInt(document.getElementById('sel-year').value, 10);
  const month = optMonth !== undefined ? optMonth : parseInt(document.getElementById('sel-month').value, 10);

  document.getElementById('a-year').textContent = year;
  document.getElementById('a-month').textContent = month;
  document.getElementById('b-year').textContent = year;
  document.getElementById('b-month').textContent = month;

  const firstOfMonth = new Date(year, month - 1, 1);
  const lastOfMonth = new Date(year, month, 0);

  const startInput = document.getElementById('print-start');
  const endInput = document.getElementById('print-end');
  if (startInput && !startInput.value) startInput.value = Calendar.toInputValue(firstOfMonth);
  if (endInput && !endInput.value) endInput.value = Calendar.toInputValue(lastOfMonth);

  let rangeStart = startInput && startInput.value
    ? Calendar.parseLocalDate(startInput.value)
    : firstOfMonth;
  let rangeEnd = endInput && endInput.value
    ? Calendar.parseLocalDate(endInput.value)
    : lastOfMonth;

  if (rangeStart > rangeEnd) {
    const tmp = rangeStart;
    rangeStart = rangeEnd;
    rangeEnd = tmp;
  }

  // Clamp inside this month. If the selected range falls completely outside,
  // fallback to the whole month to avoid an empty calendar.
  const effectiveStart = rangeStart < firstOfMonth ? firstOfMonth : rangeStart;
  const effectiveEnd = rangeEnd > lastOfMonth ? lastOfMonth : rangeEnd;

  const finalStart = effectiveStart > effectiveEnd ? firstOfMonth : effectiveStart;
  const finalEnd = effectiveStart > effectiveEnd ? lastOfMonth : effectiveEnd;

  buildGridA(year, month, finalStart, finalEnd);
  buildGridB(year, month, finalStart, finalEnd);
}

function shiftMonth(delta) {
  const yearSelect = document.getElementById('sel-year');
  const monthSelect = document.getElementById('sel-month');
  let year = parseInt(yearSelect.value, 10);
  let month = parseInt(monthSelect.value, 10) + delta;

  if (month < 1) {
    month = 12;
    year -= 1;
  } else if (month > 12) {
    month = 1;
    year += 1;
  }

  if (![...yearSelect.options].some((option) => parseInt(option.value, 10) === year)) {
    const option = document.createElement('option');
    option.value = year;
    option.textContent = year;
    yearSelect.appendChild(option);
    [...yearSelect.options]
      .sort((a, b) => parseInt(a.value, 10) - parseInt(b.value, 10))
      .forEach((option) => yearSelect.appendChild(option));
  }

  yearSelect.value = String(year);
  monthSelect.value = String(month);
  renderCal();
}

let st = document.createElement('style');
st.id = 'pg-size';
document.head.appendChild(st);

function setMode(mode) {
  document.body.classList.remove('sel-a', 'sel-b', 'sel-c', 'sel-d');
  document.body.classList.add('template-page', 'sel-' + mode);
  st.textContent = '@media print { @page { size: A4 landscape; margin:0; } }';
  document.querySelectorAll('.mode-cards .card').forEach((card, index) => {
    card.classList.toggle('active', ['a', 'b'][index] === mode);
  });
}

// 添加周開始選擇事件監聽器
document.getElementById('monthStartChips') && document.getElementById('monthStartChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-week-start]');
  if (!button) return;
  monthStartMode = button.dataset.weekStart;
  localStorage.setItem('monthlyStartMode', monthStartMode);
  syncMonthStartButtons();
  renderCal();
});

setMode('a');
Calendar.load('../../../assets/2026_calendar.json').finally(renderCal);
