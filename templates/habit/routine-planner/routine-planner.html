<div class="pages pages-wrap"><div class="page-label mode-a">▸ 模式 A — A4 直向・日常節奏規劃</div><div class="page page-port mode-a"><div class="pr-shell"><span class="pr-kicker">日常流程規劃表 · Routine Planner</span><div class="pr-header-band"><div class="pr-title-row"><strong>日常流程規劃表</strong><span>晨間 / 白天 / 夜間 / 重整</span></div><div class="pr-meta-grid cols-4"><div><span class="pr-field-label">日期</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">主題</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">關鍵習慣</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">收尾儀式</span><span class="pr-field-blank"></span></div></div></div><div class="routine-grid"><div class="stack"><div class="time-card"><span class="time-title">晨間</span><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div></div><div class="time-card"><span class="time-title">白天</span><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div></div><div class="time-card"><span class="time-title">夜間</span><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip"></span><span class="pr-mini-line"></span></div><div class="time-row"><span class="time-chip" <script src="../../../js/template-size.js"></script><script>const pageStyles={a:'A4 portrait',b:'A5 portrait'};let styleTag=document.createElement('style');styleTag.id='pg-size';document.head.appendChild(styleTag);function setMode(mode){document.body.classList.remove('sel-a','sel-b');document.body.classList.add('template-page','sel-'+mode);styleTag.textContent='@media print { @page { size: '+pageStyles[mode]+'; margin: 0; } }';document.querySelectorAll('.mode-cards .card').forEach((card,index)=>card.classList.toggle('active',['a','b'][index]===mode))}setMode('a');</script>
