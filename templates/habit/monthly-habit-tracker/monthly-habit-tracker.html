<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每月習慣追蹤表 Monthly Habit Tracker</title>
<link rel="stylesheet" href="../../../css/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0} body{font-family:'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;color:#1a1a1a} a{color:inherit;text-decoration:none}
.mode-a,.mode-b{display:none} body.sel-a .mode-a{display:block} body.sel-b .mode-b{display:block}
.month-pages{padding:104px 0 48px;display:flex;flex-direction:column;align-items:center;gap:24px}.month-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#999;padding-bottom:6px}
.quick-shell{height:210mm;padding:9mm 10mm 7mm 10mm}.month-board{border:0.4pt solid #ddd;overflow:hidden}.month-grid{display:grid;grid-template-columns:24mm repeat(31,1fr)}.month-grid.quick{grid-template-columns:24mm repeat(15,1fr)}
.month-grid>div{min-height:8.4mm;border-right:0.4pt solid #ececec;border-bottom:0.4pt solid #ececec;display:flex;align-items:center;justify-content:center;font-size:5pt}.month-grid>div:nth-child(32n){border-right:none}.month-grid.quick>div:nth-child(16n){border-right:none}
.month-head{background:#fafafa;color:#888}.month-name{justify-content:flex-start !important;padding:0 1.6mm}.month-name-line{width:100%;border-bottom:0.4pt solid #ddd;height:4mm}.month-cell::after{content:'';width:2.8mm;height:2.8mm;border:0.55pt solid #c7c7c7;border-radius:999px}.month-bottom{display:grid;grid-template-columns:1fr 1fr;gap:4mm}
@media print{.ui,.month-label{display:none!important}.month-pages{padding:0!important;gap:0!important}.page{box-shadow:none!important;page-break-after:always;break-after:page}.mode-a,.mode-b{display:none!important}body.sel-a .mode-a{display:block!important}body.sel-b .mode-b{display:block!important}}
</style>
</head>
<body class="template-page sel-a">
<div class="ui"><div class="ui-nav"><a href="../../../index.html" class="back-link"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1L3 5l4 4"/></svg>列印模板庫</a><span class="nav-sep">/</span><div class="ui-title">每月習慣追蹤表 <small>Monthly Habit Tracker</small></div></div><div class="ui-toolbar"><span class="toolbar-label">版面</span><div class="mode-cards"><button class="card active" onclick="setMode('a')"><strong>A</strong> 月追蹤 <span style="font-size:9px;opacity:.5">A4直・31日表</span></button><button class="card" onclick="setMode('b')"><strong>B</strong> 半月快檢 <span style="font-size:9px;opacity:.5">A5直・15日</span></button></div><span class="toolbar-label">尺寸</span><div class="size-cards"><button type="button" class="card size-card active" data-print-size="a4">A4</button><button type="button" class="card size-card" data-print-size="a5">A5</button><button type="button" class="card size-card" data-print-size="cut">A4裁A5</button></div><div class="toolbar-right"><span class="hint">Chrome → 存PDF → 邊距「無」</span><button class="btn-print" onclick="window.print()">列印 / 存 PDF</button></div></div></div>
<div class="pages month-pages">
  <div class="month-label mode-a">▸ 模式 A — A4 直向・31 日習慣月表</div>
  <div class="page page-port mode-a"><div class="pr-shell"><span class="pr-kicker">每月習慣追蹤表 · Monthly Habit Tracker</span><div class="pr-header-band"><div class="pr-title-row"><strong>每月習慣追蹤表</strong><span>月份 / 連續紀錄 / 趨勢 / 回顧</span></div><div class="pr-meta-grid cols-4"><div><span class="pr-field-label">月份</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">主題</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">想維持的習慣</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">月份獎勵</span><span class="pr-field-blank"></span></div></div></div><div class="month-board"><div id="monthGridA" class="month-grid"></div></div><div class="month-bottom"><div class="pr-card"><div class="pr-card-title"><span>容易成功的條件</span><em>支持條件</em></div><div class="pr-lines"><span class="pr-line"></span><span class="pr-line"></span><span class="pr-line"></span></div></div><div class="pr-card"><div class="pr-card-title"><span>本月總結</span><em>模式回顧</em></div><div class="pr-lines"><span class="pr-line"></span><span class="pr-line"></span><span class="pr-line"></span></div></div></div></div><div class="pr-page-num">A · 每月</div></div>
  <div class="month-label mode-b">▸ 模式 B — A5 直向・半月快檢</div>
  <div class="page page-a5-port mode-b"><div class="pr-shell quick-shell"><span class="pr-kicker">每月習慣追蹤表 · 半月快檢</span><div class="pr-header-band compact"><div class="pr-title-row"><strong style="font-size:14pt">半月追蹤</strong><span>15 日衝刺 / 半月快檢</span></div><div class="pr-meta-grid" style="grid-template-columns:1fr 1fr;border-top:none;"><div><span class="pr-field-label">期間</span><span class="pr-field-blank"></span></div><div><span class="pr-field-label">焦點習慣</span><span class="pr-field-blank"></span></div></div></div><div class="month-board"><div id="monthGridB" class="month-grid quick"></div></div><div class="pr-outline-stack"><div class="pr-outline-card"><span class="pr-outline-title">中途修正</span><div class="pr-lines"><span class="pr-line"></span><span class="pr-line"></span></div></div><div class="pr-outline-card tight"><span class="pr-outline-title">結束回顧</span><div class="pr-lines"><span class="pr-line"></span><span class="pr-line"></span></div></div></div></div><div class="pr-page-num">B · 半月</div></div>
</div>
<script src="../../../js/template-size.js"></script>
<script>
const pageStyles={a:'A4 portrait',b:'A5 portrait'};let styleTag=document.createElement('style');styleTag.id='pg-size';document.head.appendChild(styleTag);
function buildMonthGrid(targetId, days, rows){const grid=document.getElementById(targetId);grid.innerHTML=['<div class="month-head">習慣</div>'].concat(Array.from({length:days},(_,index)=>`<div class="month-head">${index+1}</div>`)).concat(Array.from({length:rows},()=>['<div class="month-name"><span class="month-name-line"></span></div>'].concat(Array.from({length:days},()=>'<div class="month-cell"></div>'))).flat()).join('')}
function setMode(mode){document.body.classList.remove('sel-a','sel-b');document.body.classList.add('template-page','sel-'+mode);styleTag.textContent='@media print { @page { size: '+pageStyles[mode]+'; margin: 0; } }';document.querySelectorAll('.mode-cards .card').forEach((card,index)=>card.classList.toggle('active',['a','b'][index]===mode))}
buildMonthGrid('monthGridA',31,5);buildMonthGrid('monthGridB',15,3);setMode('a');
</script>
</body>
</html>
