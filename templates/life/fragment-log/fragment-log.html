<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>片段記錄 Fragment Log</title>
<link rel="stylesheet" href="../../../css/style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif; color: #1a1a1a; }
a { color: inherit; text-decoration: none; }
.mode-a, .mode-b { display: none; }
body.sel-a .mode-a { display: block; }
body.sel-b .mode-b { display: block; }
.pages-wrap { padding: 104px 0 48px; display:flex; flex-direction:column; align-items:center; gap:24px; }
.page-label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#999; padding-bottom:6px; }
.frag-table { width:100%; border-collapse:collapse; table-layout:fixed; margin-top:4mm; }
.frag-table th, .frag-table td { border:0.4pt solid #ddd; padding:2mm 2.2mm; vertical-align:top; }
.frag-table th { background:#fafafa; font-size:5.5pt; color:#aaa; text-transform:uppercase; letter-spacing:.08em; font-weight:400; text-align:left; }
.frag-time { width:16%; }
.frag-key { width:22%; }
.frag-table td { height:16mm; }
.quick-shell { height: 210mm; padding: 9mm 10mm 7mm 10mm; display: flex; flex-direction: column; }
.quick-stack { display:flex; flex-direction:column; gap:3mm; flex:1; }
@media print {
  .ui, .page-label { display:none !important; }
  .pages-wrap { padding:0 !important; gap:0 !important; }
  .page { box-shadow:none !important; page-break-after:always; break-after:page; }
  .mode-a, .mode-b { display:none !important; }
  body.sel-a .mode-a { display:block !important; }
  body.sel-b .mode-b { display:block !important; }
}
</style>
</head>
<body class="template-page sel-a">
<div class="ui">
  <div class="ui-nav">
    <a href="../../../index.html" class="back-link"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1L3 5l4 4"/></svg>列印模板庫</a>
    <span class="nav-sep">/</span>
    <div class="ui-title">片段記錄 <small>Fragment Log</small></div>
  </div>
  <div class="ui-toolbar">
    <span class="toolbar-label">版面</span>
    <div class="mode-cards">
      <button class="card active" onclick="setMode('a')"><strong>A</strong> 完整版 <span style="font-size:9px;opacity:.5">A4直・片段捕捉</span></button>
      <button class="card" onclick="setMode('b')"><strong>B</strong> 輕量版 <span style="font-size:9px;opacity:.5">A5直・極簡記錄</span></button>
    </div>
    <span class="toolbar-label">尺寸</span>
    <div class="size-cards">
      <button type="button" class="card size-card active" data-print-size="a4">A4</button>
      <button type="button" class="card size-card" data-print-size="a5">A5</button>
      <button type="button" class="card size-card" data-print-size="cut">A4裁A5</button>
    </div>
    <div class="toolbar-right">
      <span class="hint">Chrome → 存PDF → 邊距「無」</span>
      <button class="btn-print" onclick="window.print()">列印 / 存 PDF</button>
    </div>
  </div>
</div>
<div class="pages pages-wrap">
  <div class="page-label mode-a">▸ A4 直向・快速捕捉零碎想法與當下片段</div>
  <div class="page page-port mode-a">
    <div class="pr-shell">
      <span class="pr-kicker">生活日記 · Fragment Log</span>
      <div class="pr-header-band">
        <div class="pr-title-row"><strong>片段記錄</strong><span>time / short notes / keywords</span></div>
        <div class="pr-meta-grid cols-3">
          <div><span class="pr-field-label">日期</span><span class="pr-field-blank"></span></div>
          <div><span class="pr-field-label">地點 / 情境</span><span class="pr-field-blank"></span></div>
          <div><span class="pr-field-label">今天主題</span><span class="pr-field-blank"></span></div>
        </div>
      </div>
      <table class="frag-table">
        <tr>
          <th class="frag-time">時間</th>
          <th>內容（1–3句）</th>
          <th class="frag-key">關鍵詞</th>
        </tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td></tr>
      </table>
      <div class="pr-summary-box" style="margin-top:4mm;">
        <span class="pr-field-label">今日最值得留下的一句</span>
        <div class="pr-lines"><span class="pr-line"></span><span class="pr-line"></span></div>
      </div>
    </div>
  </div>

  <div class="page-label mode-b">▸ A5 直向・極簡片段版</div>
  <div class="page page-a5-port mode-b">
    <div class="pr-shell quick-shell">
      <span class="pr-kicker">生活日記 · Fragment Log Quick</span>
      <div class="pr-header-band compact">
        <div class="pr-title-row"><strong style="font-size:14pt">片段記錄</strong><span>quick fragments</span></div>
        <div class="pr-meta-grid" style="grid-template-columns:1fr 1fr;border-top:none;">
          <div><span class="pr-field-label">日期</span><span class="pr-field-blank"></span></div>
          <div><span class="pr-field-label">情境</span><span class="pr-field-blank"></span></div>
        </div>
      </div>
      <div class="quick-stack">
        <div class="pr-outline-card">
          <span class="pr-outline-title">時間 + 內容</span>
          <div class="pr-bullet-row"><span style="font-size:6.5pt;color:#888;width:16mm">00:00</span><span class="pr-mini-line" style="flex:1"></span></div>
          <div class="pr-bullet-row"><span style="font-size:6.5pt;color:#888;width:16mm">00:00</span><span class="pr-mini-line" style="flex:1"></span></div>
          <div class="pr-bullet-row"><span style="font-size:6.5pt;color:#888;width:16mm">00:00</span><span class="pr-mini-line" style="flex:1"></span></div>
          <div class="pr-bullet-row"><span style="font-size:6.5pt;color:#888;width:16mm">00:00</span><span class="pr-mini-line" style="flex:1"></span></div>
        </div>
        <div class="pr-outline-card tight">
          <span class="pr-outline-title">關鍵詞</span>
          <div class="pr-bullet-row"><span class="pr-bullet-dot"></span><span class="pr-mini-line" style="flex:1"></span></div>
          <div class="pr-bullet-row"><span class="pr-bullet-dot"></span><span class="pr-mini-line" style="flex:1"></span></div>
          <div class="pr-bullet-row"><span class="pr-bullet-dot"></span><span class="pr-mini-line" style="flex:1"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../../../js/template-size.js"></script>
<script>
const pageStyles = { a: 'A4 portrait', b: 'A5 portrait' };
let styleTag = document.createElement('style');
styleTag.id = 'pg-size';
document.head.appendChild(styleTag);
function setMode(mode) {
  document.body.classList.remove('sel-a', 'sel-b');
  document.body.classList.add('template-page', 'sel-' + mode);
  styleTag.textContent = '@media print { @page { size: ' + pageStyles[mode] + '; margin: 0; } }';
  document.querySelectorAll('.mode-cards .card').forEach((card, index) => {
    card.classList.toggle('active', ['a', 'b'][index] === mode);
  });
}
setMode('a');
</script>
</body>
</html>
