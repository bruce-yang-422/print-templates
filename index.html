let activeCat = 'all';
let activeTags = [];
const FILTER_STATE_KEY = 'template-library-filter-state';
const filterToggle = document.getElementById('filterToggle');
const filterClose = document.getElementById('filterClose');
const filterBackdrop = document.getElementById('filterBackdrop');
const filterPanel = document.getElementById('siteFilterPanel');
const mobileFilterMq = window.matchMedia('(max-width: 720px)');
const FILTER_DRAWER_DURATION = 240;
let filterCloseTimer = null;

function initTags() {
  const container = document.getElementById('optTags');
  const clearBtn = document.createElement('button');
  clearBtn.className = 'card tag-btn active';
  clearBtn.dataset.tag = '__clear__';
  clearBtn.textContent = '全部顯示';
  container.appendChild(clearBtn);

  ALL_TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'card tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    container.appendChild(btn);
  });
}

function syncTagButtons() {
  document.querySelectorAll('#optTags .card').forEach(chip => {
    const isClear = chip.dataset.tag === '__clear__';
    chip.classList.toggle('active', isClear ? activeTags.length === 0 : activeTags.includes(chip.dataset.tag));
  });
}

function syncCategoryButtons() {
  document.querySelectorAll('#optCategory .card').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.cat === activeCat);
  });
}

function saveFilterState() {
  sessionStorage.setItem(FILTER_STATE_KEY, JSON.stringify({
    activeCat,
    activeTags
  }));
}

function restoreFilterState() {
  const rawState = sessionStorage.getItem(FILTER_STATE_KEY);
  if (!rawState) return;

  try {
    const savedState = JSON.parse(rawState);
    const validCategories = new Set(['all', ...new Set(TEMPLATES.map(template => template.category))]);
    const validTags = new Set(ALL_TAGS);

    if (typeof savedState.activeCat === 'string' && validCategories.has(savedState.activeCat)) {
      activeCat = savedState.activeCat;
    }

    if (Array.isArray(savedState.activeTags)) {
      activeTags = savedState.activeTags.filter(tag => typeof tag === 'string' && validTags.has(tag));
    }
  } catch (error) {
    sessionStorage.removeItem(FILTER_STATE_KEY);
  }
}

function syncFilterDrawerState() {
  const isMobile = mobileFilterMq.matches;
  const isOpen = document.body.classList.contains('filter-open');
  filterToggle.setAttribute('aria-expanded', isMobile && isOpen ? 'true' : 'false');
  filterPanel.setAttribute(
    'aria-hidden',
    isMobile ? String(!isOpen && !document.body.classList.contains('is-filter-closing')) : 'false'
  );
  filterPanel.classList.toggle('is-open', isMobile && isOpen);
  filterPanel.toggleAttribute(
    'inert',
    isMobile ? (!isOpen && !document.body.classList.contains('is-filter-closing')) : false
  );
}

function closeFilterDrawer() {
  if (!document.body.classList.contains('filter-open')) return;
  if (filterPanel.contains(document.activeElement)) {
    filterToggle.focus({ preventScroll: true });
  }
  document.body.classList.remove('filter-open');
  document.body.classList.add('is-filter-closing');
  window.clearTimeout(filterCloseTimer);
  filterCloseTimer = window.setTimeout(() => {
    document.body.classList.remove('is-filter-closing');
    syncFilterDrawerState();
  }, FILTER_DRAWER_DURATION);
  syncFilterDrawerState();
}

function openFilterDrawer() {
  if (!mobileFilterMq.matches) return;
  window.clearTimeout(filterCloseTimer);
  document.body.classList.remove('is-filter-closing');
  document.body.classList.add('filter-open');
  syncFilterDrawerState();
}

function toggleFilterDrawer() {
  if (document.body.classList.contains('filter-open')) closeFilterDrawer();
  else openFilterDrawer();
}

function shouldIgnoreDrawerCloseTarget(target) {
  return !!target.closest(
    '#filterToggle, #filterClose, .card, .site-filter-group, .toolbar-label, .site-filter-header .ui-title'
  );
}

function createTemplateCard(template) {
  const card = document.createElement('a');
  card.className = 'tpl-card';
  card.href = template.href;

  const topicTags = template.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

  card.innerHTML = `
    <div class="tpl-thumb">
      <img class="tpl-preview-img" src="${template.preview}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 300 200\\'%3E%3Crect width=\\'100%25\\' height=\\'100%25\\' fill=\\'%23eee\\'/%3E%3Ctext x=\\'50%25\\' y=\\'50%25\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' font-size=\\'12\\' fill=\\'%23999\\'%3EPreview Loading%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="tpl-info">
      <div class="tpl-name">${template.name}</div>
      <div class="tpl-subtitle">${TEMPLATE_SUBTITLES[template.id] || ''}</div>
      <div class="tpl-tags">${topicTags}</div>
      <div class="tpl-desc">${template.desc}</div>
    </div>`;

  return card;
}

function render() {
  const grid = document.getElementById('templateGrid');
  grid.innerHTML = '';

  const filtered = TEMPLATES.filter(tpl => {
    let catMatch = activeCat === 'all' || tpl.category === activeCat;
    let tagMatch = activeTags.length === 0 || activeTags.some(t => tpl.tags.includes(t));
    return catMatch && tagMatch;
  });

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 款模板選項`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">此篩選條件下沒有對應模板</div>';
    return;
  }

  filtered.forEach(template => grid.appendChild(createTemplateCard(template)));
}

filterToggle.addEventListener('click', toggleFilterDrawer);
filterClose.addEventListener('click', closeFilterDrawer);
filterBackdrop.addEventListener('click', closeFilterDrawer);
document.addEventListener('pointerdown', (e) => {
  if (!mobileFilterMq.matches) return;
  if (!document.body.classList.contains('filter-open')) return;
  if (shouldIgnoreDrawerCloseTarget(e.target)) return;
  closeFilterDrawer();
});
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeFilterDrawer();
});
window.addEventListener('resize', () => {
  if (!mobileFilterMq.matches) closeFilterDrawer();
  else syncFilterDrawerState();
});

document.getElementById('optCategory').addEventListener('click', (e) => {
  const btn = e.target.closest('.card');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  syncCategoryButtons();
  saveFilterState();
  render();
});

document.getElementById('optTags').addEventListener('click', (e) => {
  const btn = e.target.closest('.card');
  if (!btn) return;
  const val = btn.dataset.tag;

  if (val === '__clear__') activeTags = [];
  else if (activeTags.includes(val)) activeTags = activeTags.filter(t => t !== val);
  else activeTags.push(val);

  syncTagButtons();
  saveFilterState();
  render();
});

initTags();
restoreFilterState();
syncCategoryButtons();
syncTagButtons();
syncFilterDrawerState();
render();
</script>
