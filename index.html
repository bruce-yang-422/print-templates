<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>列印模板庫</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="site-page">

<header class="site-nav">
  <div class="site-logo">列印<span>模板</span>庫</div>
  <div class="site-tagline">A4 · A5 可列印模板</div>
  <div class="nav-right">Print Templates</div>
</header>

<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">用途</span>
    <div class="chips" id="catChips">
      <button class="chip active" data-cat="all">全部</button>
      <button class="chip" data-cat="work">工作</button>
      <button class="chip" data-cat="planner">計畫</button>
      <button class="chip" data-cat="meeting">會議</button>
      <button class="chip" data-cat="goals">目標</button>
      <button class="chip" data-cat="notes">筆記</button>
      <button class="chip" data-cat="ecommerce">電商</button>
      <button class="chip" data-cat="marketing">行銷</button>
    </div>
  </div>

  <div class="filter-divider"></div>

  <div class="filter-group">
    <span class="filter-label">尺寸</span>
    <div class="chips" id="sizeChips">
      <button class="chip active" data-size="all">全部</button>
      <button class="chip" data-size="a4">A4</button>
      <button class="chip" data-size="a5">A5</button>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
</div>

<main class="grid-wrap">
  <div class="section-title" id="sectionTitle">所有模板</div>
  <div class="template-grid" id="templateGrid"></div>
</main>

<script>
const TEMPLATES = [
  {
    id: 'work-journal',
    name: '工作日誌',
    category: 'work',
    sizes: ['a4', 'a5'],
    tags: ['日誌', '週總結'],
    desc: '每日工作記錄、問題追蹤與週回顧，可切換 A4 / A5 / A4裁A5。',
    href: 'templates/work-journal/work-journal.html',
    preview: 'previews/work/work-journal.svg',
    orient: 'port',
  },
  {
    id: 'work-report',
    name: '工作報告',
    category: 'work',
    sizes: ['a4', 'a5'],
    tags: ['報告', '摘要'],
    desc: '專案進度、結果摘要與下步行動，支援 A4 / A5 / A4裁A5 列印。',
    href: 'templates/work/report/report.html',
    preview: 'previews/work/report.svg',
    orient: 'port',
  },
  {
    id: 'daily-plan',
    name: '日計畫',
    category: 'planner',
    sizes: ['a4', 'a5'],
    tags: ['日計畫', '待辦'],
    desc: '時間區塊、待辦與回顧欄位，適合每日規劃與手寫追蹤。',
    href: 'templates/planner/daily/daily.html',
    preview: 'previews/planner/daily.svg',
    orient: 'port',
  },
  {
    id: 'weekly-plan',
    name: '週計畫',
    category: 'planner',
    sizes: ['a4', 'a5'],
    tags: ['週計畫', '七日'],
    desc: '七欄日程與清單雙模式，現在可直接輸出 A4 / A5 / A4裁A5。',
    href: 'templates/planner/weekly/weekly.html',
    preview: 'previews/planner/weekly.svg',
    orient: 'land',
  },
  {
    id: 'monthly-plan',
    name: '月計畫',
    category: 'planner',
    sizes: ['a4', 'a5'],
    tags: ['月計畫', '月曆'],
    desc: '動態年月月曆、自動週數計算與目標追蹤區塊。',
    href: 'templates/planner/monthly/monthly.html',
    preview: 'previews/planner/monthly.svg',
    orient: 'land',
  },
  {
    id: 'meeting',
    name: '會議記錄',
    category: 'meeting',
    sizes: ['a4', 'a5'],
    tags: ['會議', '決議'],
    desc: '議題、決議、行動項目與 follow-up，一頁完成會議整理。',
    href: 'templates/meeting/meeting.html',
    preview: 'previews/meeting/meeting.svg',
    orient: 'port',
  },
  {
    id: 'goals',
    name: '目標分解',
    category: 'goals',
    sizes: ['a4', 'a5'],
    tags: ['目標', 'OKR'],
    desc: '大目標拆解、里程碑與 OKR 草稿，適合個人或團隊規劃。',
    href: 'templates/goals/goals.html',
    preview: 'previews/goals/goals.svg',
    orient: 'port',
  },
  {
    id: 'cornell',
    name: 'Cornell 筆記',
    category: 'notes',
    sizes: ['a4', 'a5'],
    tags: ['筆記', 'Cornell'],
    desc: '關鍵字欄、主筆記欄與摘要區，支援課堂與閱讀整理。',
    href: 'templates/cornell/cornell.html',
    preview: 'previews/notes/cornell.svg',
    orient: 'port',
  },
  {
    id: 'product-listing',
    name: '商品上架檢查表',
    category: 'ecommerce',
    sizes: ['a4', 'a5'],
    tags: ['上架', 'SKU', '電商'],
    desc: '商品資料、圖片、定價與平台發佈前的完整檢查清單。',
    href: 'templates/ecommerce/product-listing/product-listing.html',
    preview: 'previews/ecommerce/product-listing.svg',
    orient: 'port',
  },
  {
    id: 'promo-plan',
    name: '優惠活動企劃表',
    category: 'ecommerce',
    sizes: ['a4', 'a5'],
    tags: ['活動', '促銷', '電商'],
    desc: '活動期間、折扣機制、平台與預算配置的週期規劃表。',
    href: 'templates/ecommerce/promo-plan/promo-plan.html',
    preview: 'previews/ecommerce/promo-plan.svg',
    orient: 'port',
  },
  {
    id: 'pricing',
    name: '商品定價試算表',
    category: 'ecommerce',
    sizes: ['a4', 'a5'],
    tags: ['定價', '毛利', '電商'],
    desc: '成本拆解、平台比價與底線價，適合商品上架前試算。',
    href: 'templates/ecommerce/pricing/pricing.html',
    preview: 'previews/ecommerce/pricing.svg',
    orient: 'port',
  },
  {
    id: 'weekly-ops',
    name: '電商週營運摘要',
    category: 'ecommerce',
    sizes: ['a4', 'a5'],
    tags: ['週報', '營運', '電商'],
    desc: '每週 KPI、活動節奏、補貨重點與下週動作，適合團隊例會回顧。',
    href: 'templates/ecommerce/weekly-ops/weekly-ops.html',
    preview: 'previews/ecommerce/weekly-ops.svg',
    orient: 'land',
  },
  {
    id: 'social-plan',
    name: '社群發文計畫表',
    category: 'marketing',
    sizes: ['a4', 'a5'],
    tags: ['社群', 'IG', '行銷'],
    desc: '兩週排程與內容看板雙模式，管理發文節奏與產製進度。',
    href: 'templates/marketing/social-plan/social-plan.html',
    preview: 'previews/marketing/social-plan.svg',
    orient: 'land',
  },
  {
    id: 'content-calendar',
    name: '內容行事曆',
    category: 'marketing',
    sizes: ['a4', 'a5'],
    tags: ['行事曆', '內容行銷'],
    desc: '月視圖與發佈流程追蹤，適合內容團隊月度協作。',
    href: 'templates/marketing/content-calendar/content-calendar.html',
    preview: 'previews/marketing/content-calendar.svg',
    orient: 'land',
  },
];

let activeCat = 'all';
let activeSize = 'all';

const CAT_NAMES = {
  all: '所有模板',
  work: '工作模板',
  planner: '計畫模板',
  meeting: '會議模板',
  goals: '目標模板',
  notes: '筆記模板',
  ecommerce: '電商模板',
  marketing: '行銷模板',
};

function render() {
  const filtered = TEMPLATES.filter((template) => {
    const catOk = activeCat === 'all' || template.category === activeCat;
    const sizeOk = activeSize === 'all' || template.sizes.includes(activeSize);
    return catOk && sizeOk;
  });

  const grid = document.getElementById('templateGrid');
  grid.innerHTML = '';

  document.getElementById('sectionTitle').textContent = CAT_NAMES[activeCat] || '所有模板';
  document.getElementById('resultCount').textContent = filtered.length + ' 個模板';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">此條件下沒有模板，請調整篩選</div>';
    return;
  }

  filtered.forEach((template) => {
    const card = document.createElement('article');
    card.className = 'tpl-card';

    const sizeTags = template.sizes
      .map((size) => '<span class="tag tag-size">' + size.toUpperCase() + '</span>')
      .join('');

    const topicTags = template.tags
      .map((tag) => '<span class="tag">' + tag + '</span>')
      .join('');

    card.innerHTML = `
      <div class="tpl-thumb${template.orient === 'land' ? ' land' : ''}">
        <img class="tpl-preview-img" src="${template.preview}" alt="${template.name} 預覽圖" loading="lazy">
      </div>
      <div class="tpl-info">
        <div class="tpl-name">${template.name}</div>
        <div class="tpl-tags">${sizeTags}${topicTags}</div>
        <div class="tpl-desc">${template.desc}</div>
        <div class="tpl-action">
          <a href="${template.href}" class="btn-open">開啟模板</a>
        </div>
      </div>`;

    card.addEventListener('click', (event) => {
      if (!event.target.closest('.btn-open')) {
        window.location.href = template.href;
      }
    });

    grid.appendChild(card);
  });
}

document.getElementById('catChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-cat]');
  if (!button) return;
  activeCat = button.dataset.cat;
  document.querySelectorAll('[data-cat]').forEach((chip) => chip.classList.toggle('active', chip === button));
  render();
});

document.getElementById('sizeChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-size]');
  if (!button) return;
  activeSize = button.dataset.size;
  document.querySelectorAll('[data-size]').forEach((chip) => chip.classList.toggle('active', chip === button));
  render();
});

render();
</script>
</body>
</html>
