<div class="filter-bar">

    <span class="filter-label">用途</span>

      <button class="chip" data-cat="planner">計畫</button>
      <button class="chip" data-cat="meeting">會議</button>
      <button class="chip" data-cat="goals">目標</button>

      <button class="chip" data-cat="marketing">行銷</button>
    </div>
  </div>

  <div class="filter-divider"></div>

  <div class="filter-group">
    <span class="filter-label">尺寸</span>
    <div class="chips" id="sizeChips">
      <button class="chip active" data-size="all">全部</button>
      <button class="chip" data-size="a4">A4</button>
      <button class="chip" data-size="a5">A5</button>
    </div>
  </div>

  <div class="filter-divider"></div>

  <div class="filter-group">
    <span class="filter-label">檢視</span>
    <div class="chips" id="viewChips">

      <button class="chip" data-view="card">列表檢視</button>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
</div>

  <div class="template-grid" id="templateGrid"></div>

let activeCat = 'all';
let activeSize = 'all';
let activeView = localStorage.getItem('indexViewMode') || 'thumb';

const CAT_NAMES = {
  all: '所有模板',
  work: '工作模板',
  planner: '計畫模板',
  meeting: '會議模板',
  goals: '目標模板',
  notes: '筆記模板',
  ecommerce: '電商模板',
  marketing: '行銷模板',
};

const CAT_ORDER = ['planner', 'work', 'meeting', 'goals', 'notes', 'ecommerce', 'marketing'];

const CAT_META = {
  planner: { name: '計畫模板', desc: '日程、週期、年季月規劃與旅行安排' },
  work: { name: '工作模板', desc: '日誌、報告、站會與專案啟動整理' },
  meeting: { name: '會議模板', desc: '議題、決議、行動項目與 follow-up' },
  goals: { name: '目標模板', desc: '拆解主題、里程碑與 OKR 草稿' },
  notes: { name: '筆記模板', desc: '閱讀、BuJo、Cornell 與空白書寫頁' },
  ecommerce: { name: '電商模板', desc: '上架、定價、活動與營運追蹤' },
  marketing: { name: '行銷模板', desc: '社群排程、內容月曆與發布節奏' },
};

function createTemplateCard(template) {
  const card = document.createElement('article');
  card.className = 'tpl-card' + (activeView === 'card' ? ' tpl-card-list' : '');

  const sizeTags = template.sizes
    .map((size) => '<span class="tag tag-size">' + size.toUpperCase() + '</span>')
    .join('');

  const topicTags = template.tags
    .map((tag) => '<span class="tag">' + tag + '</span>')
    .join('');

  card.innerHTML = `
    ${activeView === 'thumb' ? `
    <div class="tpl-thumb${template.orient === 'land' ? ' land' : ''}">
      <img class="tpl-preview-img" src="${template.preview}" alt="${template.name} 預覽圖" loading="lazy">
    </div>` : ''}
    <div class="tpl-info${activeView === 'card' ? ' tpl-info-list' : ''}">
      <div class="tpl-name">${template.name}</div>
      <div class="tpl-tags">${sizeTags}${topicTags}</div>
      <div class="tpl-desc">${template.desc}</div>
      <div class="tpl-action">
        <a href="${template.href}" class="btn-open">開啟模板</a>
      </div>
    </div>`;

  card.addEventListener('click', (event) => {
    if (!event.target.closest('.btn-open')) {
      window.location.href = template.href;
    }
  });

  return card;
}

function renderGrid(grid, items) {
  grid.className = 'template-grid ' + (activeView === 'card' ? 'view-card' : 'view-thumb');
  items.forEach((template) => {
    grid.appendChild(createTemplateCard(template));
  });
}

function render() {
  const filtered = TEMPLATES.filter((template) => {
    const catOk = activeCat === 'all' || template.category === activeCat;
    const sizeOk = activeSize === 'all' || template.sizes.includes(activeSize);
    return catOk && sizeOk;
  });

  const grid = document.getElementById('templateGrid');
  grid.className = 'template-groups';
  grid.innerHTML = '';

  document.getElementById('sectionTitle').textContent = CAT_NAMES[activeCat] || '所有模板';
  document.getElementById('resultCount').textContent = filtered.length + ' 個模板';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">此條件下沒有模板，請調整篩選</div>';
    return;
  }

  if (activeCat === 'all') {
    CAT_ORDER.forEach((category) => {
      const items = filtered.filter((template) => template.category === category);
      if (!items.length) return;

      const group = document.createElement('section');
      group.className = 'tpl-group';

      const meta = CAT_META[category] || { name: CAT_NAMES[category] || category, desc: '' };
      group.innerHTML = `
        <div class="tpl-group-head">
          <div>
            <div class="tpl-group-title">${meta.name}</div>
            <div class="tpl-group-sub">${meta.desc}</div>
          </div>
          <div class="tpl-group-count">${items.length} 個</div>
        </div>`;

      const groupGrid = document.createElement('div');
      renderGrid(groupGrid, items);
      group.appendChild(groupGrid);
      grid.appendChild(group);
    });
    return;
  }

  const singleGroup = document.createElement('section');
  singleGroup.className = 'tpl-group tpl-group-single';
  const groupGrid = document.createElement('div');
  renderGrid(groupGrid, filtered);
  singleGroup.appendChild(groupGrid);
  grid.appendChild(singleGroup);
}

document.getElementById('catChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-cat]');
  if (!button) return;
  activeCat = button.dataset.cat;
  document.querySelectorAll('[data-cat]').forEach((chip) => chip.classList.toggle('active', chip === button));
  render();
});

document.getElementById('sizeChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-size]');
  if (!button) return;
  activeSize = button.dataset.size;
  document.querySelectorAll('[data-size]').forEach((chip) => chip.classList.toggle('active', chip === button));
  render();
});

document.getElementById('viewChips').addEventListener('click', (event) => {
  const button = event.target.closest('[data-view]');
  if (!button) return;
  activeView = button.dataset.view;
  localStorage.setItem('indexViewMode', activeView);
  document.querySelectorAll('[data-view]').forEach((chip) => chip.classList.toggle('active', chip === button));
  render();
});

document.querySelectorAll('[data-view]').forEach((chip) => {
  chip.classList.toggle('active', chip.dataset.view === activeView);
});

render();
</script>
